<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="unsafe-url">
  <title>comment</title>
  <link rel="stylesheet" href="style.css">
  <base href="https://css-api.surahotoke.workers.dev/">
</head>
<body>
  <form id="rename-form" class="rename-form" action="/post/comment/rename" method="post" popover="manual">
    <button disabled hidden></button>
    <input name="rename" class="rename" placeholder="更新したい名前…"
      required maxlength="40" pattern="[\p{L}\p{N}\p{M}・._\-]{1,24}"
      title="24文字以内(使える記号: ・ . _ -)"
      autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false">
    <button type="button" popovertarget="rename-form">キャンセル</button>
    <button>更新</button>
  </form>
  <div class="wrapper">
    <form class="comment-form" action="/post/comment" method="post">
      <div class="name-row">
        <img src="/view/comment/name" alt="名無し">
        <button type="button" popovertarget="rename-form">編集…</button>
      </div>
      <div class="comment-row">
        <textarea name="comment" class="comment" rows="2" placeholder="コメントを入力…"
          required maxlength="280"
          autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
      </div>
      <button class="comment-submit-button">コメント送信</button>
    </form>
    <iframe class="comment-list" srcdoc="<meta http-equiv='refresh' content='10'><body style='margin:0'><img style='width: stretch' src='/view/comment/list'></body>"></iframe>
  </div>
</body>
</html>
