<style>

select,
::picker(select) {
  appearance: base-select;
}

@scope(selectedcontent) {
  .icon {
    display: none;
  }
}

::picker-icon {
  scale: .9 1.3;
  transition: 150ms;
}

:open::picker-icon { rotate: 90deg }

::picker(select) {
  transition: .3s allow-discrete;
  transform-origin: top right;
  scale: 0;
}

::picker(select):popover-open {
  scale: 1;
  @starting-style { scale: 1 0 }
}

@scope(option) {
  background: light-dark(oklch(98.5% .003 90), oklch(27% .015 265));
  :scope:hover { background: light-dark(oklch(93% .01 265), oklch(34% .02 265)) }
  :scope:checked { background: light-dark(oklch(88% .03 265), oklch(41% .04 265)) }
  :scope::checkmark {
    content: '→';
  }
}

slot {
  display: flex;
  flex-direction: column-reverse;
  gap: 4px;
}

:host:has(.all:checked) { --filter: all }
:host:has(.done:checked) { --filter: done }
:host:has(.pending:checked) { --filter: pending }
:host:has(.deleted:checked) { --filter: deleted }

</style>
