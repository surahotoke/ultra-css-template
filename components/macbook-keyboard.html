<style>

@import url(lib/column-generator/style.css);

:host {
  width: fit-content;
}

::scroll-marker-group {
  box-shadow: inset 0 0 12px #222;
  margin-inline: auto;
  display: flex;
  flex-wrap: wrap;
  width: 1326px;
  height: 540px;
  padding: 12px;
  gap: 12px;
  border-radius: 16px;
  counter-reset: column-index key 1;
  anchor-name: --keyboard;
}

::column::scroll-marker {
  background: #222;
  box-shadow: 0 0 2px 3px #fff3;
  counter-increment: column-index var(--key-counter,);
  font: 15px / 16px var(--DEFAULT_MONOSPACE);
  white-space: pre;
  color: white;
  content: counter(column-index, keyboard-layout) '\A' counter(column-index, key-layout) '\A';
  width: fit-content;
  display: flex;
  align-items: end;
  --padding: 14px;
  padding: 0 0 var(--padding) var(--padding);
  box-sizing: border-box;
  min-width: 80px;
  text-indent: calc(80px - var(--padding));
  word-spacing: calc(25px - 1ch);
  tab-size: calc(151px - var(--padding));
  max-width: 306px;
  overflow: hidden;
  height: 80px;
  border-radius: 8px;
}

::column::scroll-marker:hover { filter: brightness(.5) }
::column::scroll-marker:hover:active { filter: brightness(3) }
::column::scroll-marker:target-before { --key-counter: key }
::column::scroll-marker:target-current {
  background: #111;
  box-shadow: 0 0 2px 3px white;
  transition: 150ms;
}

::before {
  background: #333;
  color: white;
  position: absolute;
  position-anchor: --keyboard;
  position-area: bottom;
  top: 12px;
  font: 30px 'Apple Symbols', 'Hiragino Sans';
  white-space: pre;
  content: counter(key, key-name);
  padding: 20px 40px;
  border-radius: 16px;
}

@counter-style keyboard-layout { symbols:
  '  ' '' '' '' '' '' '' '' '' '' '' '' '' ''
  ' ' '' '' '' '' '' '' '' '' '' '' '' '' ' '
  '' '' '' '' '' '' '' '' '' '' '' '' '' '  '
  ' ' '' '' '' '' '' '' '' '' '' '' '' '' ' '
  '\9' '' '' '' '' '' '' '' '' '' '' '' '\9'
  '' '' ' ' ' ' '\9\9\9' ' ' ' ' '' '' '' ''
}
